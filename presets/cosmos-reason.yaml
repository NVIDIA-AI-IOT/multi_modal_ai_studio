name: "Cosmos-Reason2"
description: "NVIDIA Cosmos-Reason2-8B VLM on vLLM - Physical world reasoning with multi-frame vision"

asr:
  scheme: riva
  server: localhost:50051
  model: parakeet-1.1b-en-US-asr-streaming
  language: en-US
  # VAD settings - lower thresholds for laptop mics
  vad_start_threshold: 0.3
  vad_stop_threshold: 0.2
  speech_timeout_ms: 700

llm:
  scheme: openai
  api_base: http://localhost:8003/v1
  model: nvidia/Cosmos-Reason2-8B
  temperature: 0.7
  max_tokens: 128
  # VLM Vision Settings
  enable_vision: true
  vision_detail: auto
  vision_frames: 4        # Number of frames per turn (1-10)
  vision_quality: 0.7     # JPEG quality (0.3-1.0)
  vision_max_width: 640   # Max frame width in pixels
  vision_buffer_fps: 3.0  # Ring buffer capture rate
  system_prompt: |
    You are a vision assistant. Give ONE short sentence answers only.
    Be direct and factual about what you see. No explanations or elaboration.

tts:
  scheme: riva
  server: localhost:50051
  voice: ""
  sample_rate: 22050

devices:
  video_source: browser
  audio_input_source: browser
  audio_output_source: browser

app:
  barge_in_enabled: true
  timeline_position: right
  session_auto_save: true
  session_output_dir: ./sessions
  theme: dark




