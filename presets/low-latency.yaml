name: "Low Latency"
description: "Optimized for fast responses with aggressive VAD"

asr:
  scheme: riva
  server: localhost:50051
  model: conformer
  language: en-US
  vad_start_threshold: 0.6  # More aggressive start detection
  vad_stop_threshold: 0.4   # More aggressive stop detection
  speech_timeout_ms: 300    # Shorter timeout

llm:
  scheme: openai
  api_base: http://localhost:11434/v1
  model: llama3.2:3b  # Fast small model
  temperature: 0.7
  max_tokens: 256     # Shorter responses
  system_prompt: "You are a helpful voice assistant. Keep responses concise."

tts:
  scheme: riva
  server: localhost:50051
  voice: ""  # Empty = use default voice
  sample_rate: 22050
  stream_tts: true

devices:
  video_source: none  # Disable video for lower latency
  audio_input_source: browser
  audio_output_source: browser

app:
  barge_in_enabled: true
  timeline_position: right
  session_auto_save: true
  session_output_dir: ./sessions
  theme: dark
