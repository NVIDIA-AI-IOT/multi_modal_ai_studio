name: "High Accuracy"
description: "Prioritizes accuracy over speed with conservative VAD"

asr:
  scheme: riva
  server: localhost:50051
  model: conformer
  language: en-US
  vad_start_threshold: 0.4  # More conservative (less false starts)
  vad_stop_threshold: 0.2   # More conservative (capture full speech)
  speech_timeout_ms: 800    # Longer timeout to avoid cutting off

llm:
  scheme: openai
  api_base: http://localhost:11434/v1
  model: llama3.1:8b  # Larger, more capable model
  temperature: 0.5    # Lower temperature for more consistent responses
  max_tokens: 1024    # Allow longer, detailed responses
  system_prompt: "You are a helpful voice AI assistant. Plain text only, no markdown, no bullet points, no emojis."

tts:
  scheme: riva
  server: localhost:50051
  voice: ""  # Empty = use default voice
  sample_rate: 22050
  stream_tts: true

devices:
  video_source: browser
  audio_input_source: browser
  audio_output_source: browser

app:
  barge_in_enabled: false  # Disable barge-in to avoid interruptions
  timeline_position: right
  session_auto_save: true
  session_output_dir: ./sessions
  theme: dark
