name: "Cosmos-Reason2 (TensorRT Edge LLM)"
description: "Cosmos-Reason2 on TensorRT Edge LLM backend — optimized edge inference with image input"

asr:
  scheme: riva
  server: localhost:50051
  model: conformer
  language: en-US
  vad_start_threshold: 0.5
  vad_stop_threshold: 0.3
  speech_timeout_ms: 500

llm:
  scheme: openai
  api_base: http://localhost:58010/v1
  model: cosmos-reason2
  temperature: 0.3
  max_tokens: 256
  system_prompt: "You are a vision assistant observing the user through a live camera. Describe what you see accurately and concisely. Focus on actions, gestures, objects, and changes. One short sentence only."
  enable_vision: true
  vision_system_prompt: "You are a vision assistant observing the user through a live camera. Describe what you see accurately and concisely. Focus on actions, gestures, objects, and changes. One short sentence only."
  vision_frames: 4
  vision_detail: auto
  vision_quality: 0.7
  vision_max_width: 640
  vision_buffer_fps: 3.0
  vision_api_format: tensorrt_edge
  vision_video_encode: false      # TRT Edge LLM: images only for now (video support coming)

tts:
  scheme: riva
  server: localhost:50051
  voice: ""
  sample_rate: 22050
  stream_tts: true

devices:
  video_source: browser
  audio_input_source: browser
  audio_output_source: browser

app:
  barge_in_enabled: true
  timeline_position: right
  session_auto_save: true
  session_output_dir: ./sessions
  theme: dark
